name: Generate Biostars draft posts

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: biostars-draft-generation
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Biostars-ready draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
          SOURCE_REPOSITORIES: ${{ vars.SOURCE_REPOSITORIES || 'meenavignesh-svg/rosalind-complete-suite,meenavignesh-svg/daily-biotech-projects' }}
          REQUEST_RETRY_ATTEMPTS: ${{ vars.REQUEST_RETRY_ATTEMPTS || '3' }}
          REQUEST_RETRY_DELAY_MS: ${{ vars.REQUEST_RETRY_DELAY_MS || '2000' }}
          MAX_OUTPUT_TOKENS: ${{ vars.MAX_OUTPUT_TOKENS || '1600' }}
        run: node scripts/generate-biostars-draft.js

      - name: Upload Biostars draft
        uses: actions/upload-artifact@v4
        with:
          name: biostars-draft
          path: biostars-drafts/
          if-no-files-found: error

      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: biostars-draft-failure-report
          path: run-reports/
          if-no-files-found: ignore
