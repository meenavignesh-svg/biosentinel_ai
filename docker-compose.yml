services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: biosentinel
      POSTGRES_PASSWORD: biosentinel
      POSTGRES_DB: biosentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biosentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    env_file: .env
    command: celery -A app.jobs.worker.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
